<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Pot body -->
  <rect x="38" y="76" width="104" height="58" rx="16" fill="#fef3c7"/>
  <rect x="38" y="76" width="104" height="58" rx="16" fill="#fde68a" fill-opacity="0.5"/>
  <!-- Pot rim -->
  <rect x="28" y="68" width="124" height="14" rx="7" fill="#fff"/>
  <!-- Pot handles -->
  <rect x="16" y="90" width="18" height="8" rx="4" fill="#fef3c7"/>
  <rect x="146" y="90" width="18" height="8" rx="4" fill="#fef3c7"/>
  <!-- Lid knob -->
  <rect x="72" y="52" width="36" height="14" rx="7" fill="#fff"/>

  <!-- Leaf garnish on lid -->
  <g transform="translate(90,48)">
    <ellipse cx="0" cy="-8" rx="5" ry="10" fill="#4ade80" transform="rotate(-20)"/>
    <ellipse cx="8" cy="-6" rx="4" ry="8" fill="#22c55e" transform="rotate(15)"/>
    <line x1="0" y1="0" x2="0" y2="-6" stroke="#166534" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Steam — thick, visible at small sizes -->
  <g stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4">
    <path d="M70 42 Q66 30 70 18"/>
    <path d="M110 42 Q106 30 110 18"/>
  </g>

  <!-- Pot highlight -->
  <rect x="48" y="82" width="5" height="24" rx="2.5" fill="#fff" opacity="0.3"/>
</svg>
